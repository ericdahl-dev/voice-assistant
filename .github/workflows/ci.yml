name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: |
            public/assets
            tmp/cache/assets
          key: assets-${{ hashFiles('app/assets/**', 'app/javascript/**', 'package.json', 'yarn.lock') }}
          restore-keys: assets-

      - name: Set up database
        run: bin/rails db:schema:load

      - name: Run tests
        run: bin/rails test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Cache RuboCop
        uses: actions/cache@v4
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ hashFiles('.ruby-version', '**/.rubocop.yml', 'Gemfile.lock') }}
          restore-keys: rubocop-${{ runner.os }}-

      - name: Brakeman
        run: bin/brakeman --no-pager -q

      - name: RuboCop
        run: bin/rubocop --parallel -f github
