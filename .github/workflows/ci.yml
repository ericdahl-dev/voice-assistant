name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voice_assistant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Cache Tailwind build
        uses: actions/cache@v5
        with:
          path: app/assets/builds
          key: tailwind-${{ hashFiles('app/assets/tailwind/**', 'app/javascript/**', 'app/views/**') }}
          restore-keys: tailwind-

      - name: Build Tailwind CSS
        run: bin/rails tailwindcss:build

      - name: Set up parallel test databases
        run: bundle exec rake parallel:create parallel:load_schema

      - name: Run tests
        run: bundle exec parallel_rspec

  lint:
    name: Lint
    runs-on: ubuntu-latest

    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Cache RuboCop
        uses: actions/cache@v5
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ hashFiles('.ruby-version', '**/.rubocop.yml', 'Gemfile.lock') }}
          restore-keys: rubocop-${{ runner.os }}-

      - name: Brakeman
        run: bin/brakeman --no-pager -q

      - name: RuboCop
        run: bin/rubocop --parallel -f github
